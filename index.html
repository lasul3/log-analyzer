<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Analyzer — Java · Cloud Run · Cloud Logging</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ════════════════ HEADER ════════════════ -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="brand">
        <svg class="brand__icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <span class="brand__name">Log Analyzer</span>
      </div>
      <p class="brand__tagline">Java · Cloud Run · Google Cloud Logging</p>
    </div>
  </header>

  <main>

    <!-- ════════════════ UPLOAD VIEW ════════════════ -->
    <section id="view-upload" class="view-upload">
      <div id="dropzone" class="dropzone">
        <div class="dropzone__icon">
          <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16" />
            <line x1="12" y1="12" x2="12" y2="21" />
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
          </svg>
        </div>
        <h1 class="dropzone__title">Drop your log file here</h1>
        <p class="dropzone__hint">
          Supports <code>.log</code> <code>.txt</code> <code>.json</code>
          &mdash; plain text or GCP Cloud Logging JSON export (auto-detected)
        </p>

        <label class="btn btn--primary file-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Browse File
          <input type="file" id="file-input" accept=".log,.txt,.json" hidden />
        </label>

        <div class="or-divider"><span>or paste below</span></div>

        <textarea id="paste-input" class="paste-area" rows="7" spellcheck="false"
          placeholder="Paste log content here — plain text or JSON, one entry per line…"></textarea>

        <div class="dropzone__actions">
          <button id="sample-btn" class="btn btn--ghost">Load sample logs</button>
          <button id="analyze-btn" class="btn btn--primary" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            Analyze Logs
          </button>
        </div>
      </div>
    </section>

  </main>

  <script src="upload.js"></script>
</body>
</html>
